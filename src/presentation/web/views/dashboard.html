<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NorthRadar — Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    header .status {
      font-size: 0.85rem;
      color: var(--muted);
    }

    header .status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── KPI Cards ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      padding: 1.5rem 2rem;
    }

    .kpi-card {
      background: var(--card);
      border-radius: 10px;
      padding: 1.2rem;
      text-align: center;
    }

    .kpi-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .kpi-card .label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* ── Table ── */
    .table-container {
      padding: 0 2rem 2rem;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
    }

    thead th {
      background: #334155;
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    tbody td {
      padding: 0.6rem 1rem;
      border-top: 1px solid #334155;
      font-size: 0.85rem;
    }

    tbody tr:hover { background: #334155; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge.open { background: var(--red); color: #fff; }
    .badge.closed { background: var(--green); color: #fff; }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-size: 1.2rem;
    }

    .loading .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1rem;
      color: var(--muted);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ NorthRadar</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Conectando...</span>
  </div>
</header>

<!-- KPIs -->
<div class="kpi-row">
  <div class="kpi-card">
    <div class="value" id="kpiTotal">—</div>
    <div class="label">Total de Incidências</div>
  </div>
  <div class="kpi-card">
    <div class="value" id="kpiOpen">—</div>
    <div class="label">Em Aberto</div>
  </div>
  <div class="kpi-card">
    <div class="value" id="kpiClients">—</div>
    <div class="label">Clientes Afetados</div>
  </div>
  <div class="kpi-card">
    <div class="value" id="kpiUpdate">—</div>
    <div class="label">Última Atualização</div>
  </div>
</div>

<!-- Table -->
<div class="table-container">
  <div class="loading" id="loadingEl">
    <div class="spinner"></div>
    <div>Carregando incidências...</div>
  </div>

  <table id="tableEl" style="display:none">
    <thead>
      <tr>
        <th>Polo</th>
        <th>Regional</th>
        <th>Localidade</th>
        <th>Causa</th>
        <th>Status</th>
        <th>Clientes</th>
        <th>Início</th>
        <th>Duração</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer>
  NorthRadar &copy; 2026 — Refresh automático a cada 60 s
</footer>

<script>
  const REFRESH_MS = 60 * 1000; // refresh do dashboard (60 s)

  async function fetchData() {
    try {
      const res = await fetch('/api/incidences');
      const json = await res.json();

      if (!json.success) throw new Error('API retornou erro');

      render(json);
      setStatus('online', `Atualizado: ${formatDate(json.lastUpdated)}`);
    } catch (err) {
      console.error('Erro ao buscar dados:', err);
      setStatus('offline', 'Erro ao conectar');
    }
  }

  function render({ items, total, lastUpdated }) {
    const list = items || [];

    // KPIs
    const open = list.filter(i => !i.isResolved);
    const totalClients = list.reduce((s, i) => s + (i.clientesAfetados || 0), 0);

    document.getElementById('kpiTotal').textContent = total;
    document.getElementById('kpiOpen').textContent = open.length;
    document.getElementById('kpiClients').textContent = totalClients.toLocaleString('pt-BR');
    document.getElementById('kpiUpdate').textContent = formatDate(lastUpdated);

    // Table
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    list.forEach(item => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${esc(item.polo)}</td>
        <td>${esc(item.regional)}</td>
        <td>${esc(item.localidade)}</td>
        <td>${esc(item.causa)}</td>
        <td><span class="badge ${item.isResolved ? 'closed' : 'open'}">${esc(item.status || (item.isResolved ? 'Resolvida' : 'Aberta'))}</span></td>
        <td>${(item.clientesAfetados || 0).toLocaleString('pt-BR')}</td>
        <td>${formatDate(item.dataInicio)}</td>
        <td>${item.durationMinutes ? item.durationMinutes + ' min' : '—'}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('tableEl').style.display = '';
  }

  function setStatus(state, text) {
    const dot = document.getElementById('statusDot');
    dot.style.background = state === 'online' ? 'var(--green)' : 'var(--red)';
    document.getElementById('statusText').textContent = text;
  }

  function formatDate(str) {
    if (!str) return '—';
    const d = new Date(str);
    return d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
  }

  function esc(s) {
    if (!s) return '';
    const el = document.createElement('span');
    el.textContent = s;
    return el.innerHTML;
  }

  // Primeira carga + loop
  fetchData();
  setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
